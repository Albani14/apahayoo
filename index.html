<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untukmu — Sebuah Pengakuan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #c4687a;
    --rose-light: #e8a0b4;
    --rose-dark: #8c3048;
    --gold: #d4a85a;
    --cream: #f5e6ea;
    --bg-dark: #0e0608;
    --bg-mid: #1a0a10;
    --bg-card: #2d0e1c;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Lora', serif;
    background: var(--bg-dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── CANVAS STARS ─── */
  #starCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── FLOATING PETALS ─── */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: petalFall linear infinite;
    opacity: 0;
    font-size: 14px;
  }
  @keyframes petalFall {
    0%   { transform: translateY(-60px) rotate(0deg);   opacity: 0; }
    5%   { opacity: 0.6; }
    95%  { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
  }

  /* ─── MAIN LAYOUT ─── */
  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }

  /* ─── ORNAMENT ─── */
  .ornament {
    font-family: 'Dancing Script', cursive;
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeDown 1s ease forwards 0.4s;
  }

  /* ─── TITLE ─── */
  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(52px, 10vw, 96px);
    font-weight: 700;
    line-height: 1.05;
    margin: 20px 0 8px;
    opacity: 0;
    animation: fadeDown 1.1s ease forwards 0.7s;
    background: linear-gradient(160deg, #fff 30%, var(--rose-light) 70%, var(--rose) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .main-title-sub {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 400;
    font-style: italic;
    color: var(--rose-light);
    opacity: 0;
    animation: fadeDown 1.1s ease forwards 1s;
    margin-bottom: 40px;
  }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 32px auto;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.3s;
  }
  .divider-line {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-icon {
    color: var(--gold);
    font-size: 20px;
  }

  /* ─── TAGLINE ─── */
  .tagline {
    font-family: 'Lora', serif;
    font-size: clamp(14px, 2.5vw, 18px);
    line-height: 2;
    color: #e8d4dacc;
    max-width: 520px;
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.5s;
  }

  /* ─── CTA BUTTON ─── */
  .cta-wrap {
    margin-top: 56px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.9s;
  }
  .btn-enter {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    color: #fff;
    font-family: 'Dancing Script', cursive;
    font-size: 22px;
    padding: 18px 52px;
    border-radius: 60px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 1px;
    box-shadow: 0 8px 40px #c4687a55, 0 2px 0 #fff2 inset;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-enter::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #fff2, transparent);
    border-radius: inherit;
  }
  .btn-enter:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 16px 60px #c4687a77, 0 2px 0 #fff2 inset;
  }
  .btn-enter:active { transform: scale(0.97); }
  .btn-arrow {
    font-size: 20px;
    transition: transform 0.3s ease;
  }
  .btn-enter:hover .btn-arrow { transform: translateX(4px); }

  /* ─── SCROLL HINT ─── */
  .scroll-hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.8s;
    z-index: 10;
  }
  .scroll-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rose-light);
    animation: scrollDot 1.5s ease-in-out infinite;
  }
  .scroll-dot:nth-child(2) { animation-delay: 0.3s; }
  .scroll-dot:nth-child(3) { animation-delay: 0.6s; }
  @keyframes scrollDot {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1.2); }
  }
  .scroll-label {
    font-family: 'Dancing Script', cursive;
    font-size: 13px;
    color: var(--rose-light);
    opacity: 0.6;
    letter-spacing: 2px;
  }

  /* ─── FRAME DECORATION ─── */
  .corner {
    position: fixed;
    width: 80px; height: 80px;
    z-index: 3;
    opacity: 0.35;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ─── VIGNETTE ─── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, #0e060899 100%);
  }

  /* ─── GLOW CENTER ─── */
  .glow-center {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(ellipse, #c4687a0d 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    animation: pulseGlow 4s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
  }

  /* Nav dots */
  .nav-pages {
    position: fixed;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.5s;
  }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--rose-light);
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
  }
  .nav-dot.active, .nav-dot:hover {
    background: var(--rose-light);
    transform: scale(1.3);
  }
  .nav-dot-label {
    position: absolute;
    right: 20px;
    font-family: 'Dancing Script', cursive;
    font-size: 12px;
    color: var(--rose-light);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .nav-dot:hover .nav-dot-label { opacity: 1; }
</style>
</head>
<body>

<script>
  // ─── STAR CANVAS ───
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function initStars() {
    stars = [];
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        alpha: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
  initStars();

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const now = Date.now() / 1000;
    stars.forEach(s => {
      const a = 0.2 + 0.7 * (0.5 + 0.5 * Math.sin(now * s.speed * 10 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 220, 230, ${a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // ─── PETALS ───
  const petals = ['🌸', '🌹', '✿', '❀', '🌺'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = petals[Math.floor(Math.random() * petals.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (10 + Math.random() * 10) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    el.style.fontSize = (10 + Math.random() * 10) + 'px';
    document.body.appendChild(el);
  }
</script>
